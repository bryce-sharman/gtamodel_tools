# The following provides regular expressions that can be used to identify
# the lines of interest for the TTC-specific station transfer stations.
# As a general note on regular expressions, a '^' beginning a string means
# to look for a match at the start of the string (as opposed to anywhere
# in the string). For example: ^D will match any string starting with the 
# letter D.
stn_transfer_regexprs:
  Non_TTC_GO: ^[BDHMWYL]
  TTC_Line1: ^TS01
  TTC_Line2: ^TS02
  TTC_Line4: ^TS04
  TTC_Line5: ^TS05
  TTC_Line6: ^TS06
  TTC_Surface: ^T[0-9]
  GO: ^G    


