---
###############################################################################
# This configuration file is used in auto assignment summaries
# produced by gtamodel_tools
#
# Run description:
# 
# GTAModel Version: GTAModelv4.0 - GTAModelv4.2
# Assignment software: Emme
#
# Network Description:
#   - Variant of Bentley's Strategy City Network
#   - the test scenario is created using the following script, in gtamodel_tools
#     gtamodel_tools\scripts\tests\Prepare Test Scenario.ipynb
# 
###############################################################################

###############################################################################
# Model structure
###############################################################################

# Network and microsimulation subdirectories
# model_outputs_subdirectory: Model Outputs
network_subdirectory: Networks
demand_subdirectory: Demand
los_subdirectory: "LOS Matrices"

# Time period definitions
# auto_pfh must match those in the GTAModel run specifications
# Transit peak-hour factors are only used for post-processing
# Start and end times are in minutes after midnight
# Start times are inclusive; end times are exclusive
# Start and end time must be enclosed in quotes to force them to be 
# imported as strings.
time_period_definitions:
    AM: 
      is_assigned: True
      auto_phf: 3.0
    PM:
      is_assigned: True
      auto_phf: 2.0


###############################################################################
# Network configuration
###############################################################################

# The following entries are required to read a network.

# coordinate reference system underlying network coordinates
network_crs: EPSG:26917     # UTM 17N (NAD83)

# angle between true-north and local north (degrees counter-clockwise)
# used for interpretation of validation count data.
grid_offset: 17

# the following inputs reflect Toronto coding standards using Emme
automode_id: c
link_freeflow_speed_col: ul2
link_lane_capacity_col: ul3

# The following entries optional when reading a network, and are
# used to define summaries.

# User-defined link classifications
# This is a dictionary, where each item is composed as follows:
#   - key: classification label
#   - dictionary:
#     - 'attr': attribute used to identify link classification
#     - 'values': values of attribute to include in segment
link_classification_defs:
  arterial:
    attr: vdf
    values: [1]
  connector:
    attr: vdf
    values: [2]

# The following outlines zone ranges, based on the zone number
# Format is a dictionary where each item is a sub-dictionary (defined as follows)  
#   the key is the label
#   min: minimum (inclusive)
#   max: maximum (exclusive)
zone_ranges:
  Home: {min: 1, max: 2}
  Internal: {min: 3, max: 5}
  Work: {min: 5, max: 6}

# The following outlines node ranges, based on the node number
# Format is a dictionary where each item is a subdictionary (defined as follows)  
#   the key is the label
#   min: minimum (inclusive)
#   max: maximum (exclusive)
node_ranges: 
  0: {min: 1, max: 10}
  1: {min: 100, max: 200}
  2: {min: 200, max: 300}


# traffic countposts
#   key is the countpost label: subdirectory contains the latitude and longitude
traffic_countposts:
  link_103_104:
    latitude: 43.640418
    longitude: -79.419901
  link_104_105:
    latitude: 43.642931
    longitude: -79.403024
  link_101_103:
    latitude: 43.648974
    longitude: -79.432543
  link_105_214:
    latitude: 43.650398
    longitude: -79.393242
  invalid:
    latitude: 43.633542
    longitude: -79.392540