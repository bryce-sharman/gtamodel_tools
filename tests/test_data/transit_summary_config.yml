---
###############################################################################
# This configuration file was used by City of Toronto staff in forecasting
# runs for the TTC.
#
# Run description:
# 
# GTAModel Version: GTAModel v.0
# Assignment software: Emme
# Network Coding standard: 
#   Early NCS22 (NCS22 has not yet been finalized)
#   Primarily uses NCS16, but some customizations
# Zone System: 
#   - TTS22 zone system within Toronto (0-999 range) 
#   - TTS06 zone system outside of Toronto
#   - Extents include GTHA
#
# Network Description:
#   - Early version of TMG 2022 base year update with custom modifications
#   - Uses GO Topology
#   - Future lines include
#     - Line 3 (Ontario Line; old line 3 is removed)
#     - Line 5 (Eglinton Crosstown)
#     - Line 6 (Finch West)
#     - Line 7: Code for Eglinton East Extensions 
# 
###############################################################################

###############################################################################
# Model structure
###############################################################################

# Network and microsimulation subdirectories
# model_outputs_subdirectory: Model Outputs
network_subdirectory: Networks
demand_subdirectory: Demand
los_subdirectory: "LOS Matrices"


# Time period definitions
# auto_pfh must match those in the GTAModel run specifications
# Start and end times are are needed for transit period-level
# analyses, and are defined in minutes after midnight.
# Start times are inclusive; end times are exclusive
time_period_definitions:
    AM: 
      is_assigned: True
      auto_phf: 3.0
      start_time: 360
      end_time: 540
    PM:
      is_assigned: True
      auto_phf: 2.0
      start_time: 900
      end_time: 1140


###############################################################################
# Network configuration
###############################################################################

# coordinate reference system underlying network coordinates
network_crs: EPSG:26917     # UTM 17N (NAD83)

# angle between true-north and local north (degrees counter-clockwise)
# used for interpretation of validation count data.
grid_offset: 17 

# the following inputs reflect Toronto coding standards using Emme
automode_id: c
link_freeflow_speed_col: ul2
link_lane_capacity_col: ul3

# User-defined link classifications
# This is a dictionary, where each item is composed as follows:
#   - key: classification label
#   - dictionary:
#     - 'attr': attribute used to identify link classification
#     - 'values': values of attribute to include in segment
link_classification_defs:
  arterial:
    attr: vdf
    values: [1]
  connector:
    attr: vdf
    values: [2]

# The following outlines zone ranges, based on the zone number
# Format is a dictionary where each item is a sub-dictionary (defined as follows)  
#   the key is the label
#   min: minimum (inclusive)
#   max: maximum (exclusive)
zone_ranges:
  Home: {min: 1, max: 2}
  Internal: {min: 3, max: 5}
  Work: {min: 5, max: 6}

# The following outlines node ranges, based on the node number
# Format is a dictionary where each item is a subdictionary (defined as follows)  
#   the key is the label
#   min: minimum (inclusive)
#   max: maximum (exclusive)
node_ranges: 
  0: {min: 1, max: 10}
  1: {min: 100, max: 200}
  2: {min: 200, max: 300}

# The following provides regular expressions that can be used to identify
# the operator from the transit line name. 
# As a general note on regular expressions, a '^' beginning a string means
# to look for a match at the start of the string (as opposed to anywhere
# in the string). For example: ^D will match any string starting with the 
# letter D.
transit_operator_regexprs:
  RedGreen: (^R|^G)
  BlueBlack: ^B
  Cyan: ^C

# Line profiles show the boardings, alightings and volumes along
# a transit route. Multiple lines can be included, and the profile
# will sum the results for all lines. One note, multiple lines
# can currently only be included if one line is a subset of the 
# other (e.g. short turn). Branched routes are currently not implemented.
line_profile_definitions:
  Red:
    Red_EB: Red
    Red_WB: Red_rev
  BlueCyan:
    Blue_EB: Blue
    Blue_WB: Blue_rev
    Cyan_EB: Cyan
    Cyan_WB: Cyan_rev
  Black:
    Black_EB: TS35Aa
    Black_WB: TS35Bb


# Station name file path.
# Note that the station description file expects three columns:
# Node ID, Line, Station Name
# The names are not important, just the order. 
# The Line ID, must match a line in the 'line_profiles' inputs 	
# This file can either be an Excel or CSV file
# station_name_filepath: "S:\\Model Runs\\SummaryToolsSupport\\Station Node IDs and Description.xlsx"

# transit countposts:
#   key is the countpost label: subdirectory contains the latidude and longitude and modes
transit_countposts:
  link_103_104:
    latitude: 43.640418
    longitude: -79.419901
    modes: ["b"]
  link_104_105_b:
    latitude: 43.642931
    longitude: -79.403024
    modes: ["b"]
  link_104_105_l:
    latitude: 43.642931
    longitude: -79.403024
    modes: ["l"]
  link_101_103:
    latitude: 43.648974
    longitude: -79.432543
    modes: ["b"]
  link_105_214:
    latitude: 43.650398
    longitude: -79.393242
    modes: ["b"]
  invalid:
    latitude: 43.633542
    longitude: -79.392540
    modes: ["b"]

# The following provides regular expressions that can be used to identify
# the lines of interest for the TTC-specific station transfer stations.
# As a general note on regular expressions, a '^' beginning a string means
# to look for a match at the start of the string (as opposed to anywhere
# in the string). For example: ^D will match any string starting with the 
# letter D.
# stn_transfer_regexprs:
#   Non_TTC_GO: ^[BDHMWYL]
#   TTC_Line1: ^TS01
#   TTC_Line2: ^TS02
#   TTC_Line4: ^TS04
#   TTC_Line5: ^TS05
#   TTC_Line6: ^TS06
#   TTC_Surface: ^T[0-9]
#   GO: ^G    
